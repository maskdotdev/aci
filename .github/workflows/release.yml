name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release -p aci-cli --bin aci --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/aci" dist/aci
          chmod 0755 dist/aci
          tar -C dist -czf "aci-${{ matrix.target }}.tar.gz" aci
      - uses: actions/upload-artifact@v4
        with:
          name: aci-${{ matrix.target }}
          path: aci-${{ matrix.target }}.tar.gz

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
